apiVersion: apps/v1
kind: Deployment
metadata:
  name: ed254-consumer-validator
  namespace: swim-demo
  labels:
    app: ed254-consumer-validator
    app.kubernetes.io/name: ed254-consumer-validator
    app.kubernetes.io/part-of: ed254-consumer-validator
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ed254-consumer-validator
  template:
    metadata:
      labels:
        app: ed254-consumer-validator
    spec:
      containers:
      - name: ed254-consumer-validator
        image: quay.io/masales/swim-ed254-consumer-validator:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
          name: http
          protocol: TCP
        - containerPort: 8443
          name: https
          protocol: TCP
        envFrom:
        - configMapRef:
            name: ed254-consumer-validator-config
        - secretRef:
            name: ed254-consumer-validator-amqp-credentials
        livenessProbe:
          httpGet:
            path: /q/health/live
            port: 8080
            scheme: HTTP
          initialDelaySeconds: 10
          periodSeconds: 30
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /q/health/ready
            port: 8080
            scheme: HTTP
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        resources:
          limits:
            cpu: 500m
            memory: 256Mi
          requests:
            cpu: 100m
            memory: 128Mi
        volumeMounts:
        - name: server-cert
          mountPath: /certs/server
          readOnly: true
        - name: ca-cert
          mountPath: /certs/ca
          readOnly: true
      volumes:
      - name: server-cert
        secret:
          secretName: ed254-consumer-validator-server-tls
          items:
          - key: tls.crt
            path: tls.crt
          - key: tls.key
            path: tls.key
      - name: ca-cert
        secret:
          secretName: ed254-consumer-validator-server-tls
          items:
          - key: ca.crt
            path: ca.crt
