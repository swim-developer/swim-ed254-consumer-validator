{{- if .Values.route.enabled }}
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: {{ .Values.appName }}-mtls
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "ed254-consumer-validator.labels" . | nindent 4 }}
  annotations:
    haproxy.router.openshift.io/timeout: 60s
spec:
  host: swim-{{ .Values.appName }}.{{ .Values.clusterDomain }}
  to:
    kind: Service
    name: {{ .Values.appName }}
  port:
    targetPort: https
  tls:
    termination: passthrough
    insecureEdgeTerminationPolicy: Redirect
{{- end }}
