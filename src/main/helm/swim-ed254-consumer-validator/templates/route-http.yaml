{{- if .Values.route.enabled }}
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: {{ .Values.appName }}-http
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "ed254-consumer-validator.labels" . | nindent 4 }}
spec:
  host: swim-{{ .Values.appName }}-http.{{ .Values.clusterDomain }}
  to:
    kind: Service
    name: {{ .Values.appName }}
  port:
    targetPort: http
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
{{- end }}
