{{- if .Values.serverCert.enabled }}
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ .Values.appName }}-server-cert
  namespace: {{ .Values.namespace }}
spec:
  secretName: {{ .Values.appName }}-server-tls
  issuerRef:
    name: {{ .Values.serverCert.issuerName }}
    kind: {{ .Values.serverCert.issuerKind }}
  commonName: swim-{{ .Values.appName }}.{{ .Values.clusterDomain }}
  dnsNames:
    - swim-{{ .Values.appName }}.{{ .Values.clusterDomain }}
    - {{ .Values.appName }}.{{ .Values.namespace }}.svc
    - {{ .Values.appName }}.{{ .Values.namespace }}.svc.cluster.local
  usages:
    - server auth
  privateKey:
    algorithm: RSA
    size: 2048
{{- end }}
