{{- if .Values.clientCert.enabled }}
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ .Values.appName }}-client-certificate
  namespace: {{ .Values.namespace }}
spec:
  secretName: {{ .Values.appName }}-client-tls
  issuerRef:
    name: {{ .Values.clientCert.issuerName }}
    kind: {{ .Values.clientCert.issuerKind }}
  commonName: {{ .Values.appName }}-client
  usages:
    - digital signature
    - key encipherment
    - client auth
  privateKey:
    algorithm: RSA
    size: 2048
{{- end }}
