quarkus.application.name=swim-ed254-consumer-validator
quarkus.application.version=1.0.0
quarkus.native.resources.includes=META-INF/resources/**

quarkus.index-dependency.validator-core.group-id=com.github.swim-developer
quarkus.index-dependency.validator-core.artifact-id=swim-validator-core
quarkus.index-dependency.validator-consumer.group-id=com.github.swim-developer
quarkus.index-dependency.validator-consumer.artifact-id=swim-validator-consumer

# =============================================================================
# ED-254 Validator Configuration
# =============================================================================
validator.service.default-topic=ArrivalSequenceService
validator.queue.prefix=ED254

# =============================================================================
# HTTP
# =============================================================================
quarkus.http.port=${QUARKUS_HTTP_PORT:8080}
quarkus.http.ssl-port=${QUARKUS_HTTP_SSL_PORT:8443}
quarkus.http.insecure-requests=enabled

# =============================================================================
# OpenAPI / Swagger
# =============================================================================
quarkus.smallrye-openapi.path=/openapi
quarkus.swagger-ui.always-include=true
quarkus.swagger-ui.path=/swagger-ui

mp.openapi.servers=https://swim-ed254-consumer-validator.apps.ocp4.masales.cloud/swim/v1,http://localhost:8085/swim/v1
mp.openapi.servers.0.description=ED-254 Consumer Validator (OpenShift)
mp.openapi.servers.1.description=Local Development

mp.openapi.extensions.smallrye.securityScheme.mTLS.type=http
mp.openapi.extensions.smallrye.securityScheme.mTLS.scheme=bearer
mp.openapi.extensions.smallrye.securityScheme.mTLS.bearerFormat=X.509
mp.openapi.extensions.smallrye.securityScheme.mTLS.description=Mutual TLS authentication using EACP (European Aviation Common PKI) certificates.

mp.openapi.extensions.smallrye.info.title=ED-254 Arrival Sequence Service (Extended AMAN)
mp.openapi.extensions.smallrye.info.version=1.0.0
mp.openapi.extensions.smallrye.info.description=## Service Abstract\n\nThe Arrival Sequence Service provides arrival management information to upstream Air Navigation Service Providers (ANSPs). It publishes real-time arrival sequence data conforming to EUROCAE ED-254 standard, enabling cross-border Extended AMAN (E-AMAN) operations.\n\n## Operational Context\n\nWhen aircraft approach a destination airport, the AMAN (Arrival Manager) system calculates the optimal arrival sequence. Extended AMAN extends sequencing to 150-350 NM from the airport, allowing upstream controllers to issue speed and route advisories while flights are still in cruise.\n\n## Service Capabilities\n\n- **Subscribe to arrival sequences** - Receive real-time sequence updates per aerodrome\n- **Metering information** - Target times at metering fixes, advisory information\n- **Provider exceptions** - AMAN unavailability, degraded mode, sequencing disabled\n- **Subscription management** - Create, pause, resume, renew, delete subscriptions\n\n## Data Model\n\nMessages conform to the ED-254 XSD schema (FIXM 4.3 based):\n- **arrivalSequence** - Complete sequence snapshot with flight entries\n- **providerExceptions** - AMAN service status notifications\n\n## Compliance\n\n- **EUROCAE ED-254** (Arrival Sequence Service Performance Standard, June 2018)\n- **EUROCONTROL SPEC-170** (SWIM-TI Yellow Profile)\n- **EU Regulation 2021/116** (Common Project One - EAMAN-004/EAMAN-006)\n- **EASA DS.GE (2013/1768)** (Extended AMAN equipment requirements)
mp.openapi.extensions.smallrye.info.contact.name=SWIM Developer
mp.openapi.extensions.smallrye.info.contact.url=https://github.com/swim-developer
mp.openapi.extensions.smallrye.info.contact.email=swim@developer.io

# =============================================================================
# Database (MariaDB)
# =============================================================================
quarkus.datasource.db-kind=mariadb
quarkus.datasource.username=${MARIADB_USERNAME:swim}
quarkus.datasource.password=${MARIADB_PASSWORD:swim}
quarkus.datasource.jdbc.min-size=2
quarkus.datasource.jdbc.max-size=10
quarkus.hibernate-orm.schema-management.strategy=update
quarkus.hibernate-orm.log.sql=false

%prod.quarkus.datasource.jdbc.url=jdbc:mariadb://${MARIADB_HOST:localhost}:${MARIADB_PORT:3306}/${MARIADB_DATABASE:swim_ed254_consumer_validator}

# =============================================================================
# AMQP Broker
# =============================================================================
amqp.broker.enabled=${AMQP_BROKER_ENABLED:true}
amqp.broker.host=${AMQP_BROKER_HOST:localhost}
amqp.broker.port=${AMQP_BROKER_PORT:5672}
amqp.broker.username=${AMQP_BROKER_USERNAME:admin}
amqp.broker.password=${AMQP_BROKER_PASSWORD:admin}

# =============================================================================
# Event Generator
# =============================================================================
event.generator.enabled=${EVENT_GENERATOR_ENABLED:true}
event.generator.schedule=${EVENT_GENERATOR_SCHEDULE:0 */1 * * * ?}
event.generator.events.path=${EVENT_GENERATOR_EVENTS_PATH:/opt/events}
event.generator.exceptions.path=${EVENT_GENERATOR_EXCEPTIONS_PATH:/opt/exceptions}

# =============================================================================
# Per-Subscription Heartbeat Publisher
# =============================================================================
heartbeat.publisher.enabled=${HEARTBEAT_PUBLISHER_ENABLED:true}
heartbeat.publisher.interval=${HEARTBEAT_PUBLISHER_INTERVAL:15s}

# =============================================================================
# Security (mTLS)
# =============================================================================
quarkus.http.ssl.certificate.files=${QUARKUS_HTTP_SSL_CERTIFICATE_FILES:/certs/server/tls.crt}
quarkus.http.ssl.certificate.key-files=${QUARKUS_HTTP_SSL_CERTIFICATE_KEY_FILES:/certs/server/tls.key}
quarkus.http.ssl.certificate.trust-store-file=${QUARKUS_HTTP_SSL_CERTIFICATE_TRUST_STORE_FILE:/certs/ca/ca.crt}
quarkus.http.ssl.certificate.trust-store-file-type=PEM
quarkus.http.ssl.client-auth=required

quarkus.http.auth.permission.public.paths=/ui/*,/static/*,/q/*,/admin/*
quarkus.http.auth.permission.public.policy=permit
quarkus.http.auth.permission.authenticated.paths=/swim/*
quarkus.http.auth.permission.authenticated.policy=authenticated

# =============================================================================
# Observability
# =============================================================================
quarkus.log.level=INFO
quarkus.log.category."com.github.swim_developer.validator.ed254.consumer".level=INFO
quarkus.log.category."io.quarkus".level=INFO
quarkus.log.console.format=%d{yyyy-MM-dd HH:mm:ss.SSS} %-5p [%c] (%t) %s%e%n

# =============================================================================
# Cache
# =============================================================================
quarkus.cache.caffeine."event-files".maximum-size=10000
quarkus.cache.caffeine."event-files".expire-after-write=1d

# =============================================================================
# Profile: dev
# =============================================================================
%dev.quarkus.http.port=8085
%dev.quarkus.http.insecure-requests=enabled
%dev.quarkus.http.ssl.certificate.files=
%dev.quarkus.http.ssl.certificate.key-files=
%dev.quarkus.http.ssl.certificate.trust-store-file=
%dev.quarkus.http.ssl.client-auth=none
%dev.quarkus.http.auth.permission.authenticated.policy=permit

%dev.quarkus.datasource.devservices.enabled=false
%dev.quarkus.datasource.jdbc.url=jdbc:mariadb://localhost:3309/swim_ed254_consumer_validator

%dev.amqp.broker.host=localhost
%dev.amqp.broker.port=5676
%dev.amqp.broker.username=admin
%dev.amqp.broker.password=admin

%dev.event.generator.events.path=src/main/resources/ed254-events
%dev.event.generator.exceptions.path=src/main/resources/ed254-exceptions
%dev.heartbeat.publisher.interval=30s

%dev.quarkus.log.level=INFO

# =============================================================================
# Profile: test
# =============================================================================
%test.quarkus.http.insecure-requests=enabled
%test.quarkus.http.ssl.certificate.files=
%test.quarkus.http.ssl.certificate.key-files=
%test.quarkus.http.ssl.certificate.trust-store-file=
%test.quarkus.http.ssl.client-auth=none
%test.quarkus.http.auth.permission.authenticated.policy=permit

%test.quarkus.datasource.devservices.enabled=true
%test.quarkus.datasource.devservices.db-name=swim_ed254_validator_test
%test.quarkus.datasource.devservices.username=swim
%test.quarkus.datasource.devservices.password=swim

%test.amqp.broker.enabled=false

%test.event.generator.enabled=false
%test.event.generator.events.path=src/test/resources/ed254-events
%test.event.generator.exceptions.path=src/test/resources/ed254-exceptions
%test.heartbeat.publisher.enabled=false
